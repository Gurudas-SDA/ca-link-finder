name: Daily App Health Check

on:
  schedule:
    # Every day at 08:00 UTC (10:00 Riga time)
    - cron: '0 8 * * *'
  # Also run after every push (catches deploy breakage immediately)
  push:
    branches: [master]
  # Manual trigger
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for GitHub Pages (on push)
        if: github.event_name == 'push'
        run: sleep 60

      - name: Run tests
        id: tests
        run: npx playwright test
        continue-on-error: true

      - name: Parse test results
        if: always()
        id: results
        run: |
          if [ -f test-results.json ]; then
            TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.flaky' test-results.json)
            PASSED=$(jq '.stats.expected' test-results.json)
            FAILED=$(jq '.stats.unexpected' test-results.json)
            FLAKY=$(jq '.stats.flaky' test-results.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "flaky=$FLAKY" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "flaky=0" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PASSED: ${{ steps.results.outputs.passed }}
          FAILED: ${{ steps.results.outputs.failed }}
          TOTAL: ${{ steps.results.outputs.total }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping"
            exit 0
          fi
          python3 << 'PYEOF'
          import json, urllib.request, os
          p, f, t = os.environ["PASSED"], os.environ["FAILED"], os.environ["TOTAL"]
          status = "ALL TESTS PASSED" if f == "0" and t != "0" else f"{f}/{t} TESTS FAILED"
          msg = f"CA Link Finder Daily Test\n\n{status}\nPassed: {p} | Failed: {f} | Total: {t}\n\nView run: {os.environ['RUN_URL']}"
          data = json.dumps({"chat_id": os.environ["CHAT_ID"], "text": msg, "disable_web_page_preview": True}).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage",
              data=data, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req)
          PYEOF

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
