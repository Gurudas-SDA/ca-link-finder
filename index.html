<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaitanya Academy — Video & Audio Link Finder</title>

    <!-- Open Graph (Telegram, WhatsApp, Facebook link preview) -->
    <meta property="og:title" content="Chaitanya Academy — Video & Audio Link Finder">
    <meta property="og:description" content="~10 000 MP3 files by Prem Prayojan Prabhu | Transcripts EN/LV/RU | ~10 000 MP3 файлов | Транскрипты EN/LV/RU">
    <meta property="og:image" content="https://gurudas-sda.github.io/ca-link-finder/og-image.png?v=8">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <!-- Twitter Card (also used by Telegram) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Chaitanya Academy — Video & Audio Link Finder">
    <meta name="twitter:description" content="~10 000 MP3 files by Prem Prayojan Prabhu | Transcripts EN/LV/RU | ~10 000 MP3 файлов | Транскрипты EN/LV/RU">
    <meta name="twitter:image" content="https://gurudas-sda.github.io/ca-link-finder/og-image.png?v=8">

    <!-- PWA & Icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <meta name="theme-color" content="#2c3e6b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chaitanya Academy">

    <!-- Google Fonts: Cormorant Garamond (scholarly serif) + Inter (clean body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;800&display=swap" rel="stylesheet">

    <!-- External libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <!-- sql.js (standard, no FTS5 — uses LIKE search on normalized columns) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js"></script>

    <!-- Analytics (Umami — cookie-free, GDPR-compliant) -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="e50b4fd4-578a-4674-944d-4fefcb6999e1"></script>

    <!-- Application CSS -->
    <link rel="stylesheet" href="css/styles.css?v=4017bccf">
</head>
<body>

    <!-- ===== HERO SECTION ===== -->
    <div class="hero">
        <button class="theme-toggle" id="themeToggle" onclick="PPP.app.toggleTheme()" title="Dark / Light mode">☀️</button>
        <div class="top-left-buttons">
            <button onclick="PPP.app.showSources()" data-i18n="listOfSources">List Of Sources</button>
            <div id="sourcesList"></div>
        </div>
        <!-- Chaitanya Academy Logo (SVG mandala + text) -->
        <div class="logo-wrap">
            <svg class="logo-mandala" viewBox="44 50 96 95" xmlns="http://www.w3.org/2000/svg">
                <circle cx="79.7" cy="86.4" r="7.0" fill="#d0342c"/>
                <circle cx="103.3" cy="86.4" r="7.0" fill="#d0342c"/>
                <circle cx="79.7" cy="109.7" r="7.0" fill="#d0342c"/>
                <circle cx="103.3" cy="109.7" r="7.0" fill="#d0342c"/>
                <circle cx="91.4" cy="74.9" r="5.7" fill="#d1352d"/>
                <circle cx="68.0" cy="98.1" r="5.6" fill="#d0322b"/>
                <circle cx="115.0" cy="98.1" r="5.6" fill="#d0322b"/>
                <circle cx="91.4" cy="121.5" r="5.6" fill="#d0332b"/>
                <circle cx="77.3" cy="72.3" r="5.1" fill="#d1342d"/>
                <circle cx="105.5" cy="123.7" r="5.1" fill="#d1342c"/>
                <circle cx="117.5" cy="84.0" r="5.1" fill="#d1342c"/>
                <circle cx="65.5" cy="112.1" r="5.1" fill="#d1342d"/>
                <circle cx="71.8" cy="124.5" r="4.7" fill="#d13730"/>
                <circle cx="64.9" cy="78.7" r="4.7" fill="#d1362f"/>
                <circle cx="111.1" cy="71.7" r="4.7" fill="#d1352d"/>
                <circle cx="118.0" cy="117.8" r="4.7" fill="#d1352d"/>
                <circle cx="80.6" cy="132.3" r="2.9" fill="#d33e37"/>
                <circle cx="102.4" cy="64.0" r="2.8" fill="#d13730"/>
                <circle cx="57.0" cy="87.3" r="2.8" fill="#d1362e"/>
                <circle cx="125.8" cy="109.0" r="2.7" fill="#d0332b"/>
                <circle cx="52.5" cy="97.0" r="2.3" fill="#d34039"/>
                <circle cx="92.5" cy="59.3" r="2.1" fill="#d13830"/>
                <circle cx="130.5" cy="99.3" r="2.1" fill="#d23932"/>
                <circle cx="90.5" cy="136.7" r="2.1" fill="#d13931"/>
            </svg>
            <div class="logo-text-block">
                <div class="logo-title">CHAIT<span class="accent">A</span>NYA<br>ACADEMY</div>
                <div class="logo-subtitle">for the study of consciousness</div>
            </div>
        </div>

        <div class="language-switcher">
            <button class="lang-btn active" onclick="PPP.app.setLanguage('en')" data-lang="en">EN</button>
            <button class="lang-btn" onclick="PPP.app.setLanguage('ru')" data-lang="ru">RU</button>
            <button class="lang-btn" onclick="PPP.app.setLanguage('lv')" data-lang="lv">LV</button>
            <button class="lang-btn" onclick="PPP.app.setLanguage('it')" data-lang="it">IT</button>
            <button class="lang-btn" onclick="PPP.app.setLanguage('fr')" data-lang="fr">FR</button>
            <button class="lang-btn" onclick="PPP.app.setLanguage('es')" data-lang="es">ES</button>
        </div>

        <h1 data-i18n="pageTitle">Video & Audio Link Finder</h1>
        <div id="connectionStatus"></div>
    </div>

    <!-- ===== INSTALL BANNER ===== -->
    <div id="installBanner" style="display: none;">
        <div class="install-banner-content">
            <span class="install-text" id="installText" data-i18n="installBannerText">Install this app on your device</span>
            <button class="install-btn" id="installBtn" onclick="PPP.app.installApp()" data-i18n="installBtn">Show me how</button>
            <button class="install-dismiss" onclick="PPP.app.dismissInstall()">&times;</button>
        </div>
    </div>

    <!-- ===== SEARCH SECTION ===== -->
    <div class="search-section">
        <div class="search-card">
            <!-- Unified button row: Key words | 20 latest by date | Top Searches | Verses (all) | Verses (Top) -->
            <div class="search-quick-buttons main-button-row">
                <button class="combo-btn combo-btn-1" onclick="PPP.app.showBy2026()" data-i18n="by2026">By 2026</button>
                <button class="combo-btn combo-btn-2" onclick="PPP.app.showLatestFiles()" data-i18n="latest20Files">By Added</button>
                <button class="combo-btn combo-btn-3" onclick="PPP.app.showRecommendations()" data-i18n="recommendations">Top Searches</button>
                <button class="combo-btn combo-btn-4 search-mode-btn" data-mode="citations" data-i18n="searchModeCitations">By Verses</button>
                <button class="combo-btn combo-btn-5 search-mode-btn" data-mode="citationsTop" data-i18n="searchModeCitationsTop">Verses (Top)</button>
                <button class="combo-btn combo-btn-6" id="favoritesBtn" onclick="PPP.app.showFavorites()">&#9733; Favorites <span id="favCount" class="fav-count-badge" style="display:none"></span></button>
            </div>
            <div class="search-row">
                <button class="search-mode-btn active keywords-search-btn" data-mode="metadata" data-i18n="searchModeMetadata">Key words</button>
                <div class="search-bar" style="flex:1;">
                    <input type="text" id="searchTerm" placeholder="Loading..." disabled>
                    <button class="search-button" onclick="PPP.app.search()" data-i18n="searchButton">Search</button>
                </div>
            </div>
            <div class="search-time">
                <button class="help-search-btn help-search-btn-small" onclick="PPP.app.openHelpModal()" data-i18n="helpButton">How to use search?</button>
                <span id="timer" class="timer"></span>
            </div>
            <div id="resultsInfo"></div>
        </div>
    </div>

    <!-- ===== PROGRESS BAR (for DB loading) ===== -->
    <div class="progress-bar-wrap" id="progressBar">
        <div class="progress-bar-outer">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" data-i18n="loadingDB">Loading database...</div>
    </div>

    <!-- ===== RESULTS ===== -->
    <div class="results-container">
        <div style="position: relative;">
            <!-- Mobile swipe hint (portrait only, first visit) -->
            <div id="swipeHintMobile" aria-hidden="true">
                <span class="swipe-hint-arrow">&larr;</span>
                <span class="swipe-hint-text" data-i18n="swipeHintText">Swipe to see the transcripts</span>
            </div>
            <div id="recommendationsList" style="display: none;"></div>
            <div id="topicsList" style="display: none;"></div>
            <div id="verseSourcesList" style="display: none;"></div>
            <div id="verseList" style="display: none;"></div>
            <div id="topCitationsList" style="display: none;"></div>
            <table id="resultsTable">
                <tbody>
                    <tr>
                        <td colspan="13" class="empty-result-message" data-i18n="enterSearchTerms">Enter search terms to see results</td>
                    </tr>
                </tbody>
            </table>
            <div id="pagination"></div>
        </div>
    </div>

    <!-- ===== HELP MODAL ===== -->
    <div class="help-modal-overlay" id="helpModalOverlay" onclick="PPP.app.closeHelpModal(event)">
        <div class="help-modal" onclick="event.stopPropagation()">
            <div class="help-modal-header">
                <h2 id="helpModalTitle">How to use the search field?</h2>
                <button class="help-modal-close" onclick="PPP.app.closeHelpModal()">&times;</button>
            </div>
            <div class="help-modal-body" id="helpModalBody"></div>
        </div>
    </div>

    <!-- ===== TRANSCRIPT VIEWER MODAL ===== -->
    <div class="transcript-modal-overlay" id="transcriptModalOverlay" onclick="PPP.app.closeTranscriptModal(event)">
        <div class="transcript-modal" onclick="event.stopPropagation()">
            <div class="transcript-modal-header">
                <h2 id="transcriptModalTitle">Transcript</h2>
                <button class="help-modal-close" onclick="PPP.app.closeTranscriptModal()">&times;</button>
            </div>
            <div class="transcript-modal-body" id="transcriptModalBody"></div>
        </div>
    </div>

    <!-- ===== APPLICATION SCRIPTS ===== -->
    <!-- Load order matters: utils first, then i18n, db, search, ui, app last -->
    <script src="js/utils.js?v=dcd92397"></script>
    <script src="js/i18n.js?v=2a2010bb"></script>
    <script src="js/db.js?v=5a8d28b1"></script>
    <script src="js/search.js?v=dd27dfbf"></script>
    <script src="js/ui.js?v=413d2cd7"></script>
    <script src="js/favorites.js?v=1"></script>
    <script src="js/app.js?v=c3e815c8"></script>

</body>
</html>
